name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/laravel-app

# ─────────────────────────────────────────────────────────────
# STAGE 1 — Lint & Test  (triggers on every Pull Request)
# ─────────────────────────────────────────────────────────────
jobs:
  lint-and-test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: laravel_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_mysql

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Copy .env for testing
        run: cp .env.example .env

      - name: Set app key
        run: php artisan key:generate

      - name: Run migrations
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret
        run: php artisan migrate --force

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret
        run: php artisan test

  # ─────────────────────────────────────────────────────────────
  # STAGE 2 — Build Docker image  (triggers on push to main)
  # ─────────────────────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag from commit SHA
        id: meta
        run: echo "image_tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:${{ steps.meta.outputs.image_tag }} \
            -t $IMAGE_NAME:latest \
            .

      - name: Save image to cache
        run: docker save $IMAGE_NAME:${{ steps.meta.outputs.image_tag }} | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # STAGE 3 — Push to Docker Hub
  # ─────────────────────────────────────────────────────────────
  push:
    name: 📦 Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < image.tar.gz

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Push image to Docker Hub
        run: |
          docker push $IMAGE_NAME:${{ needs.build.outputs.image_tag }}
          docker push $IMAGE_NAME:latest

  # ─────────────────────────────────────────────────────────────
  # STAGE 4 — Manual Approval Gate before production deploy
  # ─────────────────────────────────────────────────────────────
  approve:
    name: 🔐 Awaiting Approval
    runs-on: ubuntu-latest
    needs: push
    environment: production        # ← this is what triggers the manual gate

    steps:
      - name: Approved — proceeding to deploy
        run: echo "Deployment approved for image tag ${{ needs.build.outputs.image_tag }}"

  # ─────────────────────────────────────────────────────────────
  # STAGE 5 — Deploy to production (runs only after approval)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [approve, build]

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
            docker stop laravel_app || true
            docker rm laravel_app || true
            docker run -d \
              --name laravel_app \
              --restart unless-stopped \
              -e APP_KEY=${{ secrets.APP_KEY }} \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_DATABASE=${{ secrets.DB_DATABASE }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
